<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fairway Friends ⛳️</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">⛳️ Fairway Friends</div>
        <nav>
            <a href="#" onclick="showSection('feed')">Feed</a>
            <a href="#" onclick="showSection('post')">Post Round</a>
            <a href="#" onclick="showSection('leaderboard')">Leaderboard</a>
        </nav>
        <div id="auth-status">Welcome, Guest</div>
    </header>

    <!-- Auth -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <h2>Join the Fairway</h2>
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button onclick="handleAuth()">Tee Off</button>
        </div>
    </div>

    <!-- Social Feed -->
    <section id="feed-section" class="section">
        <h1>Recent Rounds</h1>
        <div id="feed" class="feed"></div>
    </section>

    <!-- Post -->
    <section id="post-section" class="section" style="display:none;">
        <h1>Share Your Round</h1>
        <form id="round-form">
            <select id="course" required>
                <!-- populated by JS -->
            </select>
            <input type="date" id="date" required>
            <input type="number" id="score" placeholder="Total Score" required>
            <textarea id="notes" placeholder="Highlights, birdies, tough breaks..."></textarea>
            <button type="submit">Post to Feed</button>
        </form>
    </section>

    <!-- Leaderboard -->
    <section id="leaderboard-section" class="section" style="display:none;">
        <h1>🏆 Leaderboard</h1>
        <table id="leaderboard"><tbody></tbody></table>
    </section>

    <script src="script.js"></script>
</body>
</html>
